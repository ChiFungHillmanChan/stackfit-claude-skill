<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="stackreason">
  <title>stackreason</title>
  <!-- Three stacked layers. The top one is deliberately offset and outlined
       rather than filled: the layer you have not justified yet. -->
  <rect x="22" y="76" width="76" height="18" rx="4" fill="#2b6cb0"/>
  <rect x="22" y="52" width="76" height="18" rx="4" fill="#3d8bd4" opacity=".85"/>
  <rect x="34" y="28" width="76" height="18" rx="4" fill="none" stroke="#b45309" stroke-width="2.5" stroke-dasharray="6 4"/>
  <!-- The question mark against the unjustified layer -->
  <path d="M62 18 a6 6 0 0 1 10 4.5 c0 4-5 4.5-5 8" fill="none" stroke="#b45309"
        stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="67" cy="35" r="1.6" fill="#b45309"/>
</svg>
